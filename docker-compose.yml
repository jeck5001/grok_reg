services:
  grok-reg:
    image: ghcr.io/jeck5001/grok_reg:latest
    container_name: grok-reg
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      GROK_REG_DATA_DIR: /app/data
      GROK_REG_IN_DOCKER: "1"
      GROK_REG_HEADLESS: "0"
      CHROME_BIN: /usr/bin/browser
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    shm_size: "1gb"

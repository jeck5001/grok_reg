services:
  grok-reg:
    image: ghcr.io/jeck5001/grok_reg:latest
    container_name: grok-reg
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      GROK_REG_DATA_DIR: /app/data
      GROK_REG_IN_DOCKER: "1"
      GROK_REG_HEADLESS: "0"
      CHROME_BIN: /usr/bin/browser
      TZ: Asia/Shanghai
      # Web 访问密码（公网必改）。留空字符串可关闭鉴权：GROK_REG_WEB_PASSWORD=
      GROK_REG_WEB_PASSWORD: "${GROK_REG_WEB_PASSWORD:-admin}"
      # 独立 turnstile-solver；同 compose 网络可用 http://turnstile-solver:5072
      GROK_REG_TURNSTILE_SOLVER_URL: "${GROK_REG_TURNSTILE_SOLVER_URL:-http://host.docker.internal:5072}"
      # 容器默认纯 HTTP 建号（无浏览器）；可选 http|api|browser
      GROK_REG_SIGNUP_MODE: "${GROK_REG_SIGNUP_MODE:-http}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    shm_size: "1gb"
